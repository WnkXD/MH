<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>裝備模擬器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            height: 100vh;
            font-family: '微軟正黑體', 'Noto Sans TC', sans-serif;
            background-color: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            background-color: #202020;
            padding: 20px;
            border-right: 1px solid #2e2e2e;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sidebar h2 { font-size: 15px; color: #ccc; font-weight: 600; }
        .stat-box {
            background: #161616;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #2e2e2e;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stat-item { display: flex; justify-content: space-between; font-size: 13px; color: #888; }
        .stat-value { color: #f0f0f0; font-weight: bold; }

        /* ── Main ── */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            gap: 24px;
            overflow: hidden;
        }

        /* ── Grid ── */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(6, 100px);
            gap: 12px;
            flex-shrink: 0;
            align-content: start;
        }
        .grid-item {
            background-color: #222;
            border: 2px solid #333;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-color 0.15s, background 0.15s;
        }
        .grid-item:hover { border-color: #0060df; background-color: #272727; }
        .grid-item img { width: 78%; height: 78%; object-fit: contain; display: none; }
        .slot-label { position: absolute; bottom: 5px; font-size: 10px; color: #555; }
        
        /* ── Detail Panel ── */
        .detail-panel {
            width: 260px;
            flex-shrink: 0;
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            border-radius: 14px;
            padding: 20px;
            display: 1;
            flex-direction: column;
            gap: 8px;
            height: calc(100vh - 60px);  /* 60px 是你的 padding，可以調 */
        }

        .detail-panel h2 {
            font-size: 18px;
            color: #eee;
            padding-bottom: 10px;
            border-bottom: 1px solid #2e2e2e;
            flex-shrink: 0;         /* 標題不被壓縮 */
            margin-bottom: 8px;
        }

        /* 三區塊容器：flex 等分上中下 */
        .enchant-sections {
            flex: 1;                /* 撐滿剩餘高度 */
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;          /* 讓 flex 子項可以正確計算 */
        }

        /* 每個附魔區塊固定佔 1/3 */
        .enchant-row {
            flex: 1;                /* 三個各佔 1/3 */
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
        }

        /* 精靈石獨立在外，固定高度不參與均分 */
        .stone-row {
            flex: none;
            height: 140px;   /* 固定高度，自己調 */
        }

        /* 精靈石的 scroll-card 固定小高度 */
        .stone-row .scroll-card {
            flex: none;
            height: 50px;   /* 一行的高度，自己調 */
        }

        .enchant-label {
            font-size: 16px;
            color: #bdbdbd;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        select {
            width: 100%;
            background: #2a2a2a;
            color: #ddd;
            border: 1px solid #3a3a3a;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            flex-shrink: 0;
        }
        select:focus { border-color: #555; }

        /* detail card 填滿剩餘空間 */
        .scroll-card {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border: 1px solid #2e2e2e;
            border-radius: 6px;
            padding: 8px 10px;
            /* 無內容時完全透明，有內容時顯示 */
            opacity: 0;
            transition: opacity 0.1s;
        }
        .scroll-card.has-content { opacity: 1; }

        .base-row .scroll-card {
            flex: 1;
            opacity: 1;  /* 永遠顯示，不需要 has-content 控制 */
        }

        .scroll-title {
            color: #ffc107;
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .attr-list {
            list-style: none;
            font-size: 14px;
            color: #e9cd68;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .attr-list li::before { content: "• "; color: #555; }

        .base-input {
            width: 70px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 13px;
            text-align: right;
        }
        .base-input:focus { outline: none; border-color: #555; }

        /* ── Tooltip ── */
        #itemTooltip {
            position: fixed;
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            z-index: 999;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 160px;
        }

        .enchant-trigger {
            position: absolute;
            right: 4px;
            top: 4px;
            font-size: 10px;
            color: #e4e280;
            padding: 2px 4px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .grid-item:hover .enchant-trigger {
            opacity: 1;  /* hover 才顯示，平時隱藏 */
        }

        .base-input::-webkit-outer-spin-button,
        .base-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
         margin: 0;
        }

        .tooltip-option {
            width: 58px;
            height: 58px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            object-fit: contain;
            padding: 4px;
            transition: border-color 0.15s, transform 0.15s;
        }
        .tooltip-option:hover { border-color: #0060df; transform: scale(1.08); }

        /* ── Raid Panel ── */
        .raid-panel {
            width: 500px;
            flex-shrink: 0;
            background: #1c1c1c;
            border: 1px solid #2e2e2e;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: row;  /* 改成橫向 */
            gap: 8px;
            overflow-y: auto;
        }
        .raid-panel h2 { font-size: 13px; color: #888; font-weight: 600; letter-spacing: 0.05em; flex-shrink: 0; }

        .raid-item {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid transparent;
            transition: background 0.15s;
            cursor: default;
        }
        .raid-item.pass {
            color: #00ffcc;
            border-color: #1a3a35;
            background: rgba(0,255,204,0.05);
        }
        .raid-item.fail {
            color: #ff4d4d;
            border-color: #3a1a1a;
            background: rgba(255,77,77,0.05);
            cursor: pointer;
        }
        .raid-item.fail:hover { background: rgba(255,77,77,0.12); }

        /* ── Raid Detail Panel ── */
        #raidList {
            width: 200px;
            flex-shrink: 0;
        }

        .raid-detail {
            flex: 1;
            border-top: none;        /* 拿掉上邊線 */
            border-left: 1px solid #2e2e2e;  /* 改成左邊線分隔 */
            margin-top: 0;
            padding-left: 16px;
            min-width: 0;
        }
        .raid-detail h3 { font-size: 15px; color: #eee; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #2e2e2e; }
        .raid-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid #252525;
        }
        .raid-stat-row:last-child { border-bottom: none; }
        .raid-stat-row.ok { color: #aaa; }
        .raid-stat-row.shortage .label { color: #ff4d4d; }
        .raid-stat-row .values { font-size: 12px; }
        .raid-stat-row.ok .values { color: #00ffcc; }
        .raid-stat-row.shortage .values { color: #ff4d4d; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>空裝素質</h2>
    <div class="stat-box">
        <div class="stat-item">攻擊力 <input class="base-input" id="base-atk" type="number" value="0"></div>
        <div class="stat-item">攻擊速度 <input class="base-input" id="base-speed" type="number" value="0"></div>
        <div class="stat-item">暴擊率 <input class="base-input" id="base-crit" type="number" value="0"></div>
        <div class="stat-item">平衡 <input class="base-input" id="base-bal" type="number" value="0"></div>
    </div>

    <h2>角色總能力值</h2>
    <div class="stat-box">
        <div class="stat-item">攻擊力     <span class="stat-value" id="total-atk">0</span></div>
        <div class="stat-item">攻擊速度   <span class="stat-value" id="total-speed">0</span></div>
        <div class="stat-item">暴擊率     <span class="stat-value" id="total-crit">0</span>%</div>
        <div class="stat-item">平衡       <span class="stat-value" id="total-bal">0</span></div>
    </div>
</aside>

<main class="main-content" id="mainArea">

    <div class="grid-container" id="gridContainer">

        <div class="grid-item" data-type="earring" onclick="openEnchantDirect(this)">
            <img class="equipped-img">
            <span class="slot-label">耳環</span>
            <div class="enchant-trigger" onclick="event.stopPropagation(); toggleTooltip(this.parentElement)">▶</div>
        </div>

        <div class="grid-item" data-type="head"     onclick="toggleTooltip(this)"><span class="slot-label">頭部</span><img class="equipped-img"></div>
        <div class="grid-item" data-type="necklace" onclick="toggleTooltip(this)"><span class="slot-label">項鍊</span><img class="equipped-img"></div>
        <div class="grid-item" data-type="weapon"   onclick="toggleTooltip(this)"><span class="slot-label">武器</span><img class="equipped-img"></div>
        <div class="grid-item" data-type="chest"    onclick="toggleTooltip(this)"><span class="slot-label">胸部</span><img class="equipped-img"></div>
    </div>

    <!-- Detail Panel -->
    <div id="detailPanel" class="detail-panel">
        <h2 id="detailName">裝備名稱</h2>

        <!-- 字首 字尾 在 enchant-sections 裡面均分 -->
        <div class="enchant-sections">

            <!-- 裝備本身 -->
            <div class="enchant-row base-row">
                <span class="enchant-label">裝備素質</span>
                <div class="scroll-card has-content" id="baseStatCard"></div>
            </div>

            <!-- 字首 -->
            <div class="enchant-row">
                <span class="enchant-label">字首</span>
                <select id="topSelect" onchange="applyEnchant('top', this.value)"></select>
                <div class="scroll-card" id="topDetail"></div>
            </div>

            <!-- 字尾 -->
            <div class="enchant-row">
                <span class="enchant-label">字尾</span>
                <select id="endSelect" onchange="applyEnchant('end', this.value)"></select>
                <div class="scroll-card" id="endDetail"></div>
            </div>
        </div>

        <!-- 精靈石 -->
        <div class="enchant-row stone-row">
            <span class="enchant-label">精靈石</span>
            <select id="stoneSelect" onchange="applyEnchant('stone', this.value)"></select>
            <div class="scroll-card" id="stoneDetail"></div>
        </div>

    </div>
    <!-- Raid Panel -->
    <div class="raid-panel">
        <div id="raidList"></div>

        <div class="raid-detail" id="raidDetail">
            <h3 id="raidDetailName"></h3>
            <div id="raidDetailBody"></div>
        </div>
    </div>
<div id="itemTooltip"></div>
</main>


<script>
    const enchantDb = {
        "隱藏的":   { type: "top",   slots: ["earring","necklace"], stats: { speed: 1 } },
        "被遺忘的": { type: "top",   slots: ["head"],               stats: { speed: 2, crit: 3, bal: 4 } },
        "鬥魂":     { type: "end",   slots: ["head"],               stats: { crit: 8 } },
        "暴擊+2":   { type: "stone", slots: ["earring","necklace"], stats: { crit: 2 } },
        "平衡+2":   { type: "stone", slots: ["earring","necklace"], stats: { bal: 2 } }
    };

    const itemDb = {
        earring:  [ { name: "聖所的耳環", img: "accessory/earring/聖所的耳環.png", stats: { crit: 5, bal: 3 } },
                    { name: "太陽的悲願", img: "accessory/earring/太陽的悲願.png", stats: { speed: 2 } }
                ],

        head:     [ { name: "埃柳頭盔", img: "gear/head/埃柳頭盔.png", stats: { speed: 2 }, set: "埃柳" },

        ],

        necklace: [ { name: "璀璨的貓咪項鍊", img: "accessory/necklace/璀璨的貓咪項鍊.png" }    

        ],
        weapon:[ { name: "埃柳武器", img: "gear/weapon/埃柳武器.png", stats: { atk : 5}, set: "埃柳"}, 

        ],

        chest: [ { name: "兀恩雅鏈甲", img: "gear/chest/兀恩雅鏈甲.png", stats: {atk : 5}, set: "兀恩雅"}, 

        ],

    };

    const setDb = {
        "兀恩雅": {
            1: { bal: 2 },
            2: { bal: 4 },
            3: { bal: 5 },
            4: { bal: 6 },
            5: { bal: 8 },
            6: { bal: 10 },
        },
        "埃柳": {
            1: { bal: 3 },
            2: { bal: 6 },
            3: { bal: 7 },
            4: { bal: 8 },
            5: { bal: 10 },
            6: { bal: 12 },
        }
    };

    const raidDb = [
        { name: "扭曲的懺悔",   require: { atk: 0, speed: 10, crit: 50, bal: 60 } },
        { name: "貪婪的宴會廳", require: { atk: 0, speed: 12, crit: 55, bal: 65 } },
        { name: "無法遵循的預言",require: { atk: 0, speed: 15, crit: 60, bal: 70 } },
        { name: "遺忘正義的大教堂",require:{ atk: 0, speed: 18, crit: 65, bal: 75 } },
        { name: "豐饒之森",     require: { atk: 0, speed: 20, crit: 70, bal: 80 } },
    ];

    const labels = { atk: '攻擊力', speed: '攻擊速度', crit: '暴擊率', bal: '平衡' };

    let equippedState = {};
    Object.keys(itemDb).forEach(key => {
        equippedState[key] = { name: "", top: null, end: null, stone: null };
    });

    let currentType = "";
    let currentSlotEl = null;

    function toggleTooltip(el) {
        const tooltip = document.getElementById('itemTooltip');
        if (currentSlotEl === el && tooltip.style.display === 'flex') {
            closeTooltip(); return;
        }
        if (currentSlotEl) currentSlotEl.classList.remove('active-slot');
        currentSlotEl = el;
        currentType = el.dataset.type;

        const items = itemDb[currentType] || [];
        tooltip.innerHTML = items.map((item, i) =>
            `<img src="${item.img}" class="tooltip-option" title="${item.name}" onclick="selectItem(${i})">`
        ).join('');

        const rect = el.getBoundingClientRect();
        tooltip.style.left = (rect.right + 10) + 'px';
        tooltip.style.top  = rect.top + 'px';
        tooltip.style.display = 'flex';
    }

    function closeTooltip() {
        document.getElementById('itemTooltip').style.display = 'none';
        if (currentSlotEl) currentSlotEl.classList.remove('active-slot');
    }

    function selectItem(idx) {
        const item = itemDb[currentType][idx];
        equippedState[currentType].name = item.name;
        const imgEl = currentSlotEl.querySelector('img');
        imgEl.src = item.img;
        imgEl.style.display = 'block';
        showDetail(item.name);
        document.getElementById('itemTooltip').style.display = 'none';
        calculateTotal();
    }

    function openEnchantDirect(el) {
        const type = el.dataset.type;
        // 沒裝備就改成開選裝備 tooltip
        if (!equippedState[type]?.name) {
            toggleTooltip(el);
            return;
        }
        currentType = type;
        currentSlotEl = el;
        showDetail(equippedState[currentType].name);
    }

    function showDetail(name) {
        const panel = document.getElementById('detailPanel');
        panel.style.display = 'flex';
        document.getElementById('detailName').innerText = name;

        ['top','end','stone'].forEach(t => {
            const select = document.getElementById(`${t}Select`);
            const available = Object.keys(enchantDb).filter(key => {
                const e = enchantDb[key];
                return e.type === t && (e.slots.includes(currentType) || e.slots.includes('all'));
            });
            select.innerHTML = `<option value="">（無）</option>` +
                available.map(key => `<option value="${key}">${key}</option>`).join('');
            select.value = equippedState[currentType][t] || '';
            renderScrollCard(t, select.value);
        });

        // 新增：渲染道具本身屬性
        const item = itemDb[currentType].find(i => i.name === name);
        const card = document.getElementById('baseStatCard');
        if (item.stats) {
            card.innerHTML = `<ul class="attr-list">
                ${Object.keys(item.stats).map(k => `<li>${labels[k]} +${item.stats[k]}</li>`).join('')}
            </ul>`;
        } else {
            card.innerHTML = '';
        }
    }

    function applyEnchant(type, scrollName) {
        equippedState[currentType][type] = scrollName;
        renderScrollCard(type, scrollName);
        calculateTotal();
    }

    function renderScrollCard(type, name) {
        const card = document.getElementById(`${type}Detail`);
        if (!name) {
            card.innerHTML = '';
            card.classList.remove('has-content');
            return;
        }
        const data   = enchantDb[name].stats;
        card.innerHTML = `<ul class="attr-list">
                ${Object.keys(data).filter(k => data[k] > 0)
                    .map(k => `<li>${labels[k]} +${data[k]}</li>`).join('')}
            </ul>`;
        card.classList.add('has-content');
    }

    // ── 計算核心：抽成獨立函式 ──
    function getCurrentTotal() {
        let total = { atk: 0, speed: 0, crit: 0, bal: 0 };

        total.atk   += parseInt(document.getElementById('base-atk').value)   || 0;
        total.speed += parseInt(document.getElementById('base-speed').value) || 0;
        total.crit  += parseInt(document.getElementById('base-crit').value)  || 0;
        total.bal   += parseInt(document.getElementById('base-bal').value)   || 0;

        Object.keys(equippedState).forEach(slot => {
            const item = equippedState[slot];
            if (item.name) {
                const baseItem = itemDb[slot]?.find(i => i.name === item.name);
                if (baseItem?.stats) {
                    Object.keys(total).forEach(k => total[k] += baseItem.stats[k] || 0);
                }
            }
            ['top','end','stone'].forEach(t => {
                const name = item[t];
                if (name && enchantDb[name]) {
                    const s = enchantDb[name].stats;
                    Object.keys(total).forEach(k => total[k] += s[k] || 0);
                }
            });
        });

        // 套裝加成
        const setCount = {};
        Object.keys(equippedState).forEach(slot => {
            const item = equippedState[slot];
            if (!item.name) return;
            const baseItem = itemDb[slot]?.find(i => i.name === item.name);
            if (baseItem?.set) {
                setCount[baseItem.set] = (setCount[baseItem.set] || 0) + 1;
            }
        });
        Object.keys(setCount).forEach(setName => {
            const bonus = setDb[setName]?.[setCount[setName]];
            if (bonus) Object.keys(total).forEach(k => total[k] += bonus[k] || 0);
        });

        return total;
    }

    function calculateTotal() {
        const total = getCurrentTotal();

        document.getElementById('total-atk').innerText   = total.atk;
        document.getElementById('total-speed').innerText = total.speed;
        document.getElementById('total-crit').innerText  = total.crit;
        document.getElementById('total-bal').innerText   = total.bal;

        renderRaidList(total);
    }

    // ── Raid List ──
    function renderRaidList(total) {
        const list = document.getElementById('raidList');
        list.innerHTML = raidDb.map(raid => {
            const pass = Object.keys(raid.require).every(k => total[k] >= raid.require[k]);
            return `<div class="raid-item ${pass ? 'pass' : 'fail'}"
                        ${pass ? '' : `onclick="openRaidDetail('${raid.name}')"`}>
                ${raid.name}
            </div>`;
        }).join('');
    }

    // ── Raid Detail ──
    function openRaidDetail(name) {
        const raid = raidDb.find(r => r.name === name);
        const total = getCurrentTotal();

        document.getElementById('raidDetailName').innerText = name;
        document.getElementById('raidDetailBody').innerHTML =
            Object.keys(raid.require)
                .filter(k => raid.require[k] > 0)
                .map(k => {
                    const ok = total[k] >= raid.require[k];
                    return `<div class="raid-stat-row ${ok ? 'ok' : 'shortage'}">
                        <span class="label">${labels[k]}</span>
                        <span class="values">${total[k]} / ${raid.require[k]}</span>
                    </div>`;
                }).join('');

        document.getElementById('raidDetail').style.display = 'block';
    }

    // ── 事件 ──
    ['base-atk','base-speed','base-crit','base-bal'].forEach(id => {
        document.getElementById(id).addEventListener('input', calculateTotal);
    });

    document.addEventListener('click', e => {
        if (!e.target.closest('.grid-item') && !e.target.closest('#itemTooltip')) {
            closeTooltip();
        }
    });

    // 初始化 raid list
    renderRaidList({ atk: 0, speed: 0, crit: 0, bal: 0 });
</script>
</body>
</html>
