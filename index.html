<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業裝備模擬器</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: '微軟正黑體', sans-serif;
            background-color: #1a1a1a;
            color: white;
        }

        /* 左側控制列 */
        .sidebar {
            width: 220px;
            background-color: #252525;
            padding: 20px;
            border-right: 1px solid #333;
            flex-shrink: 0;
        }

        /* 主畫布 */
        .main-content {
            flex-grow: 1;
            padding: 50px;
            position: relative; /* 讓 Tooltip 可以根據此容器定位 */
        }

        /* 3x6 格子系統 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(6, 110px);
            gap: 15px;
        }

        /* 格子基礎樣式 */
        .grid-item {
            background-color: #222;
            border: 2px solid #3d3d3d;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .grid-item:hover {
            border-color: #007bff;
            background-color: #2a2a2a;
        }

        .grid-item img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            display: none;
        }

        /* 部位文字標籤 (提示目前這格是什麼部位) */
        .slot-label {
            position: absolute;
            bottom: 5px;
            font-size: 10px;
            color: #666;
        }

        /* 7 號格子簍空 */
        .grid-item.empty {
            visibility: hidden;
            pointer-events: none;
        }

        /* --- Tooltip 懸浮選單 --- */
        .equipment-tooltip {
            display: none; /* 預設隱藏 */
            position: absolute;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 999;
            grid-template-columns: repeat(2, 60px); /* 兩欄預覽 */
            gap: 8px;
        }

        .tooltip-option {
            width: 60px;
            height: 60px;
            background-color: #333;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tooltip-option:hover {
            border-color: #007bff;
            transform: scale(1.1);
        }

        /* 點選格子的發亮效果 */
        .active-slot {
            border-color: #ffc107 !important;
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>裝備配置</h2>
        <p style="color:#888; font-size: 13px;">點擊格位開啟部位選單</p>
        <button style="padding:10px; cursor:pointer;" onclick="location.reload()">清空所有裝備</button>
    </aside>

    <main class="main-content" id="mainArea">
        <div class="grid-container" id="gridContainer">
            <!-- 1號格：指定為頭部 -->
            <div class="grid-item" data-type="head" onclick="toggleTooltip(this)">
                <span class="slot-label">HEAD</span>
                <img src="" class="equipped-img">
            </div>

            <!-- 2號格：指定為手部 -->
            <div class="grid-item" data-type="hand" onclick="toggleTooltip(this)">
                <span class="slot-label">HAND</span>
                <img src="" class="equipped-img">
            </div>

            <!-- 其他格子以此類推，這裡先跑迴圈生成剩下的 -->
            <script>
                for (let i = 3; i <= 18; i++) {
                    const isEmpty = i === 7 ? 'empty' : '';
                    document.write(`
                        <div class="grid-item ${isEmpty}" data-type="other" onclick="toggleTooltip(this)">
                            <span class="slot-label">Slot ${i}</span>
                            <img src="" class="equipped-img">
                        </div>
                    `);
                }
            </script>
        </div>

        <!-- 懸浮選單 -->
        <div id="itemTooltip" class="equipment-tooltip">
            <!-- 內容會由 JS 動態生成 -->
        </div>
    </main>

    <script>
        // 裝備資料庫：你之後可以在這裡增加各部位的圖片網址
        const itemDatabase = {
            head: [
                "https://via.placeholder.com/60/FFD700?text=H1", 
                "https://via.placeholder.com/60/DAA520?text=H2"
            ],
            hand: [
                "https://via.placeholder.com/60/C0C0C0?text=S1",
                "https://via.placeholder.com/60/808080?text=S2"
            ],
            other: [
                "https://via.placeholder.com/60/444444?text=?"
            ]
        };

        let currentActiveSlot = null;

        function toggleTooltip(element) {
            const tooltip = document.getElementById('itemTooltip');
            
            // 如果點擊的是同一個格子且選單已開啟，則關閉
            if (currentActiveSlot === element && tooltip.style.display === 'grid') {
                closeTooltip();
                return;
            }

            // 移除舊的發亮效果
            if (currentActiveSlot) currentActiveSlot.classList.remove('active-slot');
            
            currentActiveSlot = element;
            element.classList.add('active-slot');

            const type = element.getAttribute('data-type');
            renderOptions(type);

            // 定位：將 Tooltip 放到格子的右邊
            const rect = element.getBoundingClientRect();
            const mainRect = document.getElementById('mainArea').getBoundingClientRect();
            
            tooltip.style.left = (rect.right - mainRect.left + 15) + 'px';
            tooltip.style.top = (rect.top - mainRect.top) + 'px';
            tooltip.style.display = 'grid';
        }

        function renderOptions(type) {
            const tooltip = document.getElementById('itemTooltip');
            const items = itemDatabase[type] || itemDatabase['other'];
            
            tooltip.innerHTML = items.map(src => `
                <img src="${src}" class="tooltip-option" onclick="selectItem('${src}')">
            `).join('');
        }

        function selectItem(src) {
            if (currentActiveSlot) {
                const imgTag = currentActiveSlot.querySelector('.equipped-img');
                imgTag.src = src;
                imgTag.style.display = 'block';
                closeTooltip();
            }
        }

        function closeTooltip() {
            const tooltip = document.getElementById('itemTooltip');
            tooltip.style.display = 'none';
            if (currentActiveSlot) currentActiveSlot.classList.remove('active-slot');
            currentActiveSlot = null;
        }

        // 點擊空白處關閉
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.grid-item') && !e.target.closest('.equipment-tooltip')) {
                closeTooltip();
            }
        });
    </script>
</body>
</html>
